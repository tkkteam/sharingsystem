services:
  - type: web
    name: share-system-mini
    env: node
    plan: free
    rootDir: next-app
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: share-system-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: share-system-db
    plan: free
